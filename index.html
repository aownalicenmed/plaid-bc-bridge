<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecting to your bank...</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e0e0e0;
            border-top-color: #1a73e8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        h2 { font-size: 18px; font-weight: 500; color: #333; margin-bottom: 8px; }
        p  { font-size: 13px; color: #888; }
        .error { color: #d32f2f; font-size: 14px; margin-top: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner" id="spinner"></div>
        <h2 id="title">Connecting to your bank...</h2>
        <p id="subtitle">Please wait while Plaid loads.</p>
        <p class="error" id="error"></p>
    </div>

    <script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>
    <script>
        function setStatus(title, subtitle) {
            document.getElementById('title').textContent = title;
            document.getElementById('subtitle').textContent = subtitle || '';
        }

        function showError(msg) {
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('title').textContent = 'Something went wrong';
            document.getElementById('error').textContent = msg;
        }

        function getLinkToken() {
            var params = new URLSearchParams(window.location.search);
            return params.get('token') || '';
        }

        function getReturnUrl() {
            var params = new URLSearchParams(window.location.search);
            return params.get('return_url') || 'https://businesscentral.dynamics.com/OAuthLanding.htm';
        }

        function redirectToBC(publicToken, accountsJson) {
            // Encode the accounts JSON safely for URL
            var encodedAccounts = encodeURIComponent(accountsJson);

            // Plaid public tokens can be long — we put them as code= and accounts as state=
            // OAuthControlAddIn reads these back via AuthorizationCodeRetrieved
            var returnUrl = getReturnUrl();
            var finalUrl = returnUrl
                + '?code=' + encodeURIComponent(publicToken)
                + '&state=' + encodedAccounts;

            window.location.href = finalUrl;
        }

        var linkToken = getLinkToken();

        if (!linkToken) {
            showError('No link token provided. Please return to Business Central and try again.');
        } else {
            setStatus('Opening bank connection...', 'A Plaid window will appear shortly.');

            var handler = Plaid.create({
                token: linkToken,

                onSuccess: function (publicToken, metadata) {
                    setStatus('Bank connected!', 'Returning to Business Central...');
                    document.getElementById('spinner').style.display = 'none';

                    var accounts = [];
                    if (metadata && metadata.accounts) {
                        for (var i = 0; i < metadata.accounts.length; i++) {
                            var acc = metadata.accounts[i];
                            accounts.push({
                                id:      acc.id      || '',
                                name:    acc.name    || '',
                                mask:    acc.mask    || '',
                                type:    acc.type    || '',
                                subtype: acc.subtype || ''
                            });
                        }
                    }

                    var institutionName = '';
                    if (metadata && metadata.institution) {
                        institutionName = metadata.institution.name || '';
                    }

                    var accountsJson = JSON.stringify({
                        institution: institutionName,
                        accounts: accounts
                    });

                    redirectToBC(publicToken, accountsJson);
                },

                onExit: function (err, metadata) {
                    if (err) {
                        showError('Connection error: ' + (err.display_message || err.error_message || 'Unknown error'));
                    } else {
                        setStatus('Connection cancelled.', 'You can close this window.');
                        document.getElementById('spinner').style.display = 'none';
                    }
                },

                onLoad: function () {
                    setStatus('Opening bank connection...', 'Please complete the login in the Plaid window.');
                    handler.open();
                }
            });

            handler.open();
        }
    </script>
</body>
</html>
